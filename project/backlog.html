<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your game achievements and hours played.">
    <meta name="author" content="André Piros">
    <title>WDD 131 | Backlog Tracker</title>

    <link rel="stylesheet" href="styles/backlog.css">
    <link rel="stylesheet" href="styles/backlog-large.css">

    <script defer src="scripts/backlog.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        media="print"
        onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap">
    </noscript>
</head>
<body>
<header>
    <div class="header-top">
        <a href="backlog-home.html" class="nav-logo" aria-label="Game Backlog Tracker Home">
            <img alt="Game Backlog Tracker Logo" src="images/projecticon.webp" width="70" height="70" loading="lazy">
        </a>
        <h1>Backlog Tracker</h1>
        <nav aria-label="Main menu">
            <button id="menu" aria-label="Menu"></button>
        </nav>
    </div>
    <div class="nav-links">
        <a href="backlog-home.html">Home</a>
        <a href="backlog.html">Tracker</a>
        <a href="references.html">References</a>
    </div>
</header>

<main>
    <section class="hero">
        <h2>Track Your Progress</h2>
        <p>Log your hours and achievements for each game in your backlog.</p>
    </section>

    <div class="grid-container">
        <section class="card">
            <h3>Your Info</h3>
            <div class="form-group">
                <label for="username">Your Name</label>
                <input type="text" id="username" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="gameSelect">Select a Game</label>
                <select id="gameSelect" required>
                    <option value="" disabled selected>Choose a game...</option>
                    <option value="Hollow Knight">Hollow Knight</option>
                    <option value="Halo 4">Halo 4</option>
                    <option value="Stardew Valley">Stardew Valley</option>
                    <option value="Castle Crashers">Castle Crashers</option>
                    <option value="Hades">Hades</option>
                </select>
            </div>
            <div class="form-group">
                <label for="hoursPlayed">Hours Played</label>
                <input type="number" id="hoursPlayed" placeholder="e.g. 42" min="0" required>
            </div>
        </section>

        <section class="card">
            <h3>Log an Achievement</h3>
            <p id="achievementHint" class="hint">Select a game first to see available achievements.</p>
            <div class="form-group">
                <label for="achievementInput">Achievement Name</label>
                <input type="text" id="achievementInput" placeholder="Type achievement name..." list="achievementSuggestions" disabled>
                <datalist id="achievementSuggestions"></datalist>
            </div>
            <button id="addAchievementBtn" class="cta-button" disabled>Add Achievement</button>
        </section>
    </div>

    <section class="card" id="summaryCard" style="margin-top: 2rem; display: none;">
        <h3 id="summaryTitle">Progress Summary</h3>
        <p id="summaryText"></p>
        <ul id="achievementList" class="accent-list"></ul>
        <button id="saveBtn" class="cta-button" style="margin-top: 1rem;">Save Progress</button>
    </section>
</main>

<footer>
    <p>&copy; <span id="currentyear"></span> André Piros</p>
    <p>Last Modified: <span id="lastModified"></span></p>
</footer>
</body>
</html>
