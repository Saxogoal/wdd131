<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 | Country Page</title>
    <meta name="description" content="A page dedicated to my Country, providing information about it's data and weather.">
    <meta name="author" content="Andre Piros">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css" media="(min-width: 640px)">

    <script defer src="scripts/place.js"></script>
</head>

<body>
    <header>
        <h1>Brazil</h1>
    </header>

    <main>

        <section id="hero">
            <picture>
                <source 
                    srcset="images/hero-small.webp 600w, images/hero-large.webp 1200w"
                    sizes="(min-width: 640px) 100vw, 100vw">
                <img 
                    src="images/hero-small.webp" 
                    alt="São Paulo Wildlife"
                    fetchpriority="high"
                    loading="eager"
                    decoding="async">
            </picture>

            <section id="data">
                <h2>Data</h2>
                <table>
                    <tr><td class="label">Area:</td><td class="value">8.516 million km²</td></tr>
                    <tr><td class="label">Population:</td><td class="value">213,562,666</td></tr>
                    <tr><td class="label">Capital:</td><td class="value">Brasília</td></tr>
                    <tr><td class="label">Language:</td><td class="value">Portuguese</td></tr>
                    <tr><td class="label">Currency:</td><td class="value">Brazilian Real (BRL)</td></tr>
                    <tr><td class="label">Timezone:</td><td class="value">UTC-2,-3,-4,-5</td></tr>
                    <tr><td class="label">Calling Code:</td><td class="value">+55</td></tr>
                    <tr><td class="label">Internet TLD:</td><td class="value">.br</td></tr>
                </table>
            </section>

            <section id="weather">
                <h2>Weather</h2>
                <table>
                    <tr><td class="label">Temperature:</td><td class="value" id="temp">Value</td></tr>
                    <tr><td class="label">Conditions:</td><td class="value">Value</td></tr>
                    <tr><td class="label">Wind Speed:</td><td class="value" id="wind">Value</td></tr>
                    <tr><td class="label">Wind Chill:</td><td class="value" id="windchill">Value</td></tr>
                </table>
            </section>

        </section>

    </main>

    <footer>
        <p>&copy;🏀<span id="currentyear"></span> André Piros 🏀 São Paulo, Brazil</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
